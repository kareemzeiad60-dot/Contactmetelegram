name: 🤖 تشغيل بوت التليجرام

# عند push إلى main أو جدولة يومية
on:
  push:
    branches: [ main ]
  schedule:
    # شغل البوت كل يوم في الساعة 9 صباحاً (UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:  # تشغيل يدوي من Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 160  # 2.5 ساعة

    steps:
      - name: 📥 استقبال كود المستودع
        uses: actions/checkout@v3

      - name: 🐍 إعداد Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 تثبيت المكتبات المطلوبة
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 تشغيل بوت التليجرام
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🤖 البوت يعمل الآن..."
          python bot.py

      - name: ✅ انتهى التشغيل
        if: always()
        run: echo "البوت انتهى من العمل بعد 2.5 ساعة كما هو مخطط"
